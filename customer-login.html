<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login | GhanaTrust Bank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-container {
            background: var(--white);
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 450px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .logo svg {
            width: 40px;
            height: 40px;
        }

        h2 {
            color: var(--text-main);
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer-links {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
            border: 1px solid #fee2e2;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <a href="index.html" class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="7" width="20" height="14" rx="2"></rect>
                    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                </svg>
                <span>GhanaTrust Bank</span>
            </a>
            <h2>Welcome Back</h2>
            <p>Enter your credentials to access your account</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="loginBtn" class="btn">Sign In</button>
        </form>

        <div class="footer-links">
            Don't have an account? <a href="account-opening-new.html">Open an account</a><br><br>
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        // Initialize EmailJS (kept as fallback)
        emailjs.init("TU6Bjt38GuhTyp7TC");

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBC6abatrIxH9gFaXQx8Q4gDdu59dU1U8E",
            authDomain: "live-chat-61efd.firebaseapp.com",
            databaseURL: "https://live-chat-61efd-default-rtdb.firebaseio.com",
            projectId: "live-chat-61efd",
            storageBucket: "live-chat-61efd.firebasestorage.app",
            messagingSenderId: "1059519432349",
            appId: "1:1059519432349:web:a40c6fee6357651c6af674",
            measurementId: "G-W8CFYEYHJ4"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // Initialize Firebase Functions (uncomment after deploying)
        // const functions = firebase.functions();
        // const sendOTPFirebase = functions.httpsCallable('sendOTP');
        // USE_FIREBASE_EMAIL = true; // Set to true after deploying Firebase Functions
        const USE_FIREBASE_EMAIL = false; // Change this after Firebase deployment

        let currentUserData = null;
        let generatedOTP = null;

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');

            btn.disabled = true;
            btn.innerText = "Verifying...";
            errorDiv.style.display = 'none';

            try {
                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('email').equalTo(email).once('value');
                
                if (snapshot.exists()) {
                    let userFound = false;
                    let userId = null;
                    snapshot.forEach((childSnapshot) => {
                        const userData = childSnapshot.val();
                        if (userData.password === password) {
                            userFound = true;
                            userId = childSnapshot.key;
                            currentUserData = {
                                userId: userId,
                                firstName: userData.firstName,
                                lastName: userData.lastName,
                                email: userData.email,
                                accountType: userData.accountType,
                                branch: userData.branch
                            };
                        }
                    });

                    if (userFound) {
                        // Generate and send OTP
                        await sendOTP(email);
                    } else {
                        showError("Invalid password. Please try again.");
                        btn.disabled = false;
                        btn.innerText = "Sign In";
                    }
                } else {
                    showError("No account found with this email. Please register for an account.");
                    btn.disabled = false;
                    btn.innerText = "Sign In";
                }
            } catch (error) {
                console.error(error);
                showError("An error occurred. Please check your connection.");
                btn.disabled = false;
                btn.innerText = "Sign In";
            }
        }

        async function sendOTP(email) {
            const btn = document.getElementById('loginBtn');
            btn.innerText = "Sending OTP...";

            // Generate 6-digit OTP
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

            try {
                // Use server endpoint to send OTP
                console.log("Sending OTP via server to:", email);
                const response = await fetch('https://rich234-github-io.onrender.com/api/send-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        firstName: currentUserData.firstName || "Valued Customer",
                        otp: generatedOTP
                    })
                });
                
                const result = await response.json();
                console.log("Server Response:", result);
                
                if (!result.success) {
                    throw new Error(result.message || "Failed to send OTP");
                }

                // Show OTP input form
                document.getElementById('loginForm').innerHTML = `
                    <div class="form-group">
                        <label for="otpInput">Enter OTP Code</label>
                        <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 0.5rem;">We've sent a 6-digit code to ${email}</p>
                        <input type="text" id="otpInput" placeholder="000000" maxlength="6" required style="text-align: center; letter-spacing: 0.5rem; font-size: 1.25rem;">
                    </div>
                    <button type="submit" id="verifyBtn" class="btn">Verify & Continue</button>
                    <p style="text-align: center; margin-top: 1rem; font-size: 0.875rem;">
                        <a href="#" onclick="resendOTP(); return false;" style="color: #1e40af;">Resend OTP</a> | 
                        <a href="customer-login.html" style="color: #64748b;">Back to Login</a>
                    </p>
                `;
                
                document.getElementById('loginForm').onsubmit = verifyOTP;
                btn.style.display = 'none';
                
                // Store OTP expiry
                localStorage.setItem('otpExpiry', Date.now() + 5 * 60 * 1000);
                
            } catch (error) {
                console.error("OTP send failed:", error);
                showError("Failed to send OTP: " + (error?.message || "Please try again."));
                btn.disabled = false;
                btn.innerText = "Sign In";
            }
        }

        async function resendOTP() {
            if (!currentUserData) return;
            
            // Show resending message
            const resendLink = event.target;
            const originalText = resendLink.textContent;
            resendLink.textContent = 'Sending...';
            resendLink.style.pointerEvents = 'none';
            
            // Generate new OTP
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            try {
                // Use server endpoint to send OTP
                console.log("Resending OTP via server to:", currentUserData.email);
                const response = await fetch('https://rich234-github-io.onrender.com/api/send-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: currentUserData.email,
                        firstName: currentUserData.firstName || "Valued Customer",
                        otp: generatedOTP
                    })
                });
                
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.message || "Failed to send OTP");
                }
                
                // Update expiry
                localStorage.setItem('otpExpiry', Date.now() + 10 * 60 * 1000);
                
                resendLink.textContent = 'OTP Sent!';
                setTimeout(() => {
                    resendLink.textContent = originalText;
                    resendLink.style.pointerEvents = 'auto';
                }, 3000);
                
            } catch (error) {
                console.error("Resend OTP failed:", error);
                resendLink.textContent = 'Failed - Try Again';
                resendLink.style.pointerEvents = 'auto';
                alert("Failed to resend OTP: " + (error?.message || "Please try again."));
            }
        }

        function verifyOTP(event) {
            event.preventDefault();
            const enteredOTP = document.getElementById('otpInput').value;
            const btn = document.getElementById('verifyBtn');
            const expiry = localStorage.getItem('otpExpiry');

            if (Date.now() > expiry) {
                showError("OTP has expired. Please login again.");
                setTimeout(() => window.location.reload(), 2000);
                return;
            }

            if (enteredOTP === generatedOTP) {
                btn.innerText = "Verifying...";
                
                // Store user session
                localStorage.setItem('currentUser', JSON.stringify(currentUserData));
                localStorage.removeItem('otpExpiry');
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                showError("Invalid OTP. Please try again.");
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerText = message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
