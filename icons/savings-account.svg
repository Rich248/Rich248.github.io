<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Shield background -->
  <path d="M12 2l8 3v6c0 5.5-3.8 10.7-8 12c-4.2-1.3-8-6.5-8-12V5l8-3z" stroke="#10b981" stroke-width="2" fill="#f0fdf4"/>
  
  <!-- Dollar sign -->
  <text x="12" y="14" text-anchor="middle" font-size="5" font-weight="bold" fill="#10b981">$</text>
  
  <!-- Growth arrows -->
  <path d="M6 8l1-1l1 1" stroke="#10b981" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M18 8l-1-1l-1 1" stroke="#10b981" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M7 7v2" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M17 7v2" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Interest rate badge -->
  <rect x="9" y="4" width="6" height="3" rx="1" fill="#059669"/>
  <text x="12" y="6.5" text-anchor="middle" font-size="2.5" fill="white" font-weight="bold">15%</text>
  
  <!-- Security lock -->
  <rect x="10" y="16" width="4" height="3" rx="0.5" stroke="#10b981" stroke-width="1" fill="none"/>
  <circle cx="12" cy="17.5" r="0.5" fill="#10b981"/>
  
  <!-- Coins -->
  <circle cx="8" cy="19" r="1" fill="#ffd700"/>
  <circle cx="16" cy="19" r="1" fill="#ffd700"/>
</svg>
